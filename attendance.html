<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>出席判定</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

 

<style>
#camera{
    margin:20px 0;
}

#result-box{
    padding:20px;
    border-radius:10px;
    font-size:24px;
    font-weight:bold;
    text-align:center;
    margin:20px 0;
}

.ok{
    background:#28a745;
    color:white;
}

.ng{
    background:#dc3545;
    color:white;
}

.warn{
    background:#ffc107;
    color:black;
}

.wait{
    background:#6c757d;
    color:white;
}

#student-info{
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 5px rgba(0,0,0,0.2);
}

#score{
    margin-top:15px;
    font-size:18px;
}
</style>


</head>

<body>

<div class="container">

<h1>出席判定</h1>


<div class="card left-align">
    <h2>カメラ設定</h2>
    <p style="color: #666;">現在のモデル: <span id="current-model" style="font-weight: bold; color: #3498db;">未設定</span></p>
    <button onclick="startAttendance()" class="btn-primary">
        出席判定開始
    </button>
    <div id="camera"></div>
</div>

<div class="card">
    <div id="result-box" class="wait">
        待機中...
    </div>
</div>

<div class="card left-align">
    <h2>判定結果</h2>
    <div class="info-grid">
        <p>学年<span id="grade-view" class="badge">-</span></p>
        <p>クラス<span id="class-view" class="badge">-</span></p>
        <p>出席番号<span id="number-view" class="badge">-</span></p>
        <p>氏名<span id="name-view" class="badge">-</span></p>
    </div>
</div>

<div class="card left-align">
    <h2>上位候補</h2>
    <div id="score" style="background:#f8fafc; padding:15px; border-radius:8px; border:1px solid #e2e8f0; color:#475569;">
        <!-- 候補がここに表示されます -->
    </div>
</div>

<div class="back-link-container">
    <a href="index.html" class="btn btn-outline">ホームへ戻る</a>
</div>

</div>

<script src="script.js"></script>




</body>
</html>
